name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # 或者你的默认分支
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build site
        run: pnpm build   # 生成 dist/ (或你的输出目录)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/     # 根据你的 Astro 配置，通常输出在 dist/ 或 ./

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
